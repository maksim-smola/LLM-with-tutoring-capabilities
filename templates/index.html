<!DOCTYPE html>
<html lang="ru">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Учебный AI-ассистент</title>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<script>
window.MathJax = {
tex: {inlineMath: [['$', '$'], ['\\(', '\\)']]},
svg: {fontCache: 'global'}
};
</script>

<script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>

<style>

body {
font-family: system-ui;
background: linear-gradient(to right, #eef2ff, #f8fafc);
margin: 0;
display: flex;
flex-direction: column;
align-items: center;
height: 100vh;
}

header {
width: 100%;
background: #1e3a8a;
color: white;
padding: 18px;
text-align: center;
font-size: 22px;
font-weight: 600;
letter-spacing: 0.5px;
}

.chat-container {
width: 90%;
max-width: 850px;
background: white;
margin-top: 20px;
padding: 20px;
border-radius: 14px;
box-shadow: 0 10px 30px rgba(0,0,0,0.08);
height: 60vh;
overflow-y: auto;
}

.message {
margin: 12px 0;
padding: 12px 16px;
border-radius: 12px;
animation: fadeIn 0.3s ease-in-out;
line-height: 1.6;
}

.user {
background: #e0f2fe;
text-align: right;
}

.bot {
background: #f8fafc;
border-left: 4px solid #1e3a8a;
}

@keyframes fadeIn {
from {opacity: 0; transform: translateY(8px);}
to {opacity: 1; transform: translateY(0);}
}

.input-panel {
display: flex;
gap: 10px;
margin-top: 14px;
width: 90%;
max-width: 850px;
}

input {
flex: 1;
padding: 12px;
border-radius: 8px;
border: 1px solid #cbd5e1;
font-size: 16px;
}

button {
padding: 12px 20px;
border: none;
background: #1e3a8a;
color: white;
border-radius: 8px;
font-size: 16px;
cursor: pointer;
transition: 0.2s ease;
}

button:hover {
background: #162d6b;
transform: translateY(-1px);
}

.loading {
margin-top: 8px;
color: #64748b;
font-style: italic;
}

footer {
margin-top: 12px;
font-size: 13px;
color: #64748b;
}

</style>

</head>

<body>

<header>
Учебный интеллектуальный ассистент
</header>

<div class="chat-container" id="chat">

<div class="message bot">
Здравствуйте! Я помогу разобрать задачу шаг за шагом.
</div>

</div>

<div class="input-panel">

<input id="question"
placeholder="Введите учебный вопрос..." />

<button onclick="ask()">
Отправить
</button>

</div>

<div id="loading" class="loading"></div>

<footer>
Разработано в рамках исследовательского проекта по образовательным нейросетям
</footer>

<script>

async function ask() {

let question = document.getElementById("question").value

if (!question) return

let chat = document.getElementById("chat")

chat.innerHTML += `
<div class="message user">
${question}
</div>
`

document.getElementById("question").value = ""

document.getElementById("loading").innerText =
"Ассистент анализирует задачу..."

let response = await fetch("/ask", {

method: "POST",

headers: {
"Content-Type": "application/json"
},

body: JSON.stringify({
question: question
})

})

let data = await response.json()

document.getElementById("loading").innerText = ""

let formatted =
marked.parse(data.answer)

chat.innerHTML += `
<div class="message bot">
${formatted}
</div>
`

MathJax.typesetPromise()

chat.scrollTop = chat.scrollHeight

}

</script>

</body>

</html>
