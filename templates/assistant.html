<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Чат с учебным AI-ассистентом</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script>
    window.MathJax = {
      tex: { inlineMath: [["$", "$"], ["\\(", "\\)"]] },
      svg: { fontCache: "global" }
    };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>
  <style>
    @import url("https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap");

    :root {
      --ink: #2f2119;
      --muted: #7c6254;
      --line: #ecd2c2;
      --panel: #fff7f1;
      --soft: #fff0e5;
      --peach: #ff9b72;
      --apricot: #ffb080;
      --rose: #ef9a86;
      --sage: #d8b99f;
      --caramel: #d86f3d;
      --blue: var(--caramel);
      --green: var(--sage);
      --violet: var(--rose);
      --shadow: 0 18px 50px rgba(119, 74, 45, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      font-family: Nunito, Inter, "Segoe UI", system-ui, sans-serif;
      background:
        linear-gradient(115deg, rgba(255, 246, 239, 0.96), rgba(255, 226, 209, 0.86), rgba(255, 235, 221, 0.92), rgba(255, 249, 244, 0.96)),
        repeating-linear-gradient(120deg, rgba(255, 155, 114, 0.16) 0 1px, transparent 1px 34px);
      background-size: 220% 220%, auto;
      animation: backgroundFlow 18s ease-in-out infinite;
    }

    body::before {
      content: "";
      position: fixed;
      inset: -18% -8%;
      z-index: -1;
      background:
        linear-gradient(105deg, transparent 8%, rgba(255, 145, 96, 0.22) 18%, transparent 34%),
        linear-gradient(78deg, transparent 28%, rgba(255, 176, 128, 0.22) 42%, transparent 60%),
        linear-gradient(132deg, transparent 44%, rgba(216, 111, 61, 0.14) 58%, transparent 76%);
      filter: blur(18px);
      transform: rotate(-4deg);
      animation: ribbonDrift 24s ease-in-out infinite alternate;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .nav {
      position: sticky;
      top: 0;
      z-index: 20;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      padding: 14px clamp(18px, 5vw, 70px);
      border-bottom: 1px solid rgba(239, 215, 200, 0.8);
      background: rgba(255, 250, 245, 0.82);
      backdrop-filter: blur(14px);
    }

    .brand {
      display: inline-flex;
      align-items: center;
      min-width: 0;
      gap: 10px;
      font-weight: 800;
    }

    .brand-mark {
      display: grid;
      flex: 0 0 auto;
      width: 34px;
      height: 34px;
      place-items: center;
      border-radius: 8px;
      color: #fff;
      background: linear-gradient(135deg, var(--peach), var(--caramel));
      font-size: 14px;
    }

    .nav-links {
      display: flex;
      gap: 4px;
      color: #334155;
      font-size: 14px;
      font-weight: 700;
      white-space: nowrap;
    }

    .nav-links a {
      padding: 9px 10px;
      border-radius: 8px;
    }

    .nav-links a:hover {
      color: var(--blue);
      background: #eef4ff;
    }

    .page {
      display: grid;
      grid-template-columns: minmax(230px, 310px) minmax(0, 1fr);
      gap: 18px;
      min-height: calc(100vh - 63px);
      padding: clamp(18px, 4vw, 38px) clamp(16px, 5vw, 70px);
    }

    .sidebar,
    .chat-panel {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 250, 245, 0.76);
      box-shadow: var(--shadow);
      backdrop-filter: blur(16px);
    }

    .sidebar {
      align-self: start;
      padding: 18px;
    }

    .eyebrow {
      display: inline-flex;
      margin: 0 0 12px;
      padding: 7px 10px;
      color: var(--green);
      border: 1px solid #b7e3dc;
      border-radius: 8px;
      background: #f0fdfa;
      font-size: 13px;
      font-weight: 800;
      line-height: 1.35;
    }

    h1 {
      margin: 0;
      font-size: clamp(28px, 4vw, 42px);
      line-height: 1.1;
      letter-spacing: 0;
      overflow-wrap: anywhere;
    }

    .sidebar p {
      margin: 14px 0 0;
      color: var(--muted);
      line-height: 1.6;
    }

    .tips {
      display: grid;
      gap: 10px;
      margin-top: 18px;
    }

    .tip {
      width: 100%;
      padding: 13px;
      border: 1px solid var(--line);
      border-radius: 8px;
      color: #51382a;
      background: #fff8ef;
      font: inherit;
      font-weight: 700;
      text-align: left;
      cursor: pointer;
    }

    .tip:hover {
      border-color: #e8b99f;
      background: #fff1e3;
    }

    .history-actions {
      margin-top: 14px;
    }

    .clear-history {
      width: 100%;
      min-height: 42px;
      padding: 0 13px;
      border: 1px solid var(--line);
      border-radius: 8px;
      color: #6f4935;
      background: rgba(255, 248, 239, 0.72);
      font: inherit;
      font-weight: 800;
      cursor: pointer;
      transition: background 0.25s ease, border-color 0.25s ease, transform 0.25s ease;
    }

    .clear-history:hover {
      transform: translateY(-1px);
      border-color: #e8b99f;
      background: #fff1e3;
    }

    .chat-panel {
      display: grid;
      grid-template-rows: minmax(420px, 1fr) auto auto;
      min-width: 0;
      overflow: hidden;
    }

    .chat-container {
      min-height: 0;
      padding: 20px;
      overflow-y: auto;
      background: #fffaf5;
    }

    .message {
      width: fit-content;
      max-width: min(760px, 86%);
      margin: 0 0 14px;
      padding: 14px 16px;
      border-radius: 8px;
      line-height: 1.62;
      overflow-wrap: anywhere;
    }

    .message.user {
      margin-left: auto;
      color: #fff;
      background: linear-gradient(135deg, var(--peach), var(--caramel));
    }

    .message.bot {
      color: #1e293b;
      background: var(--soft);
      border-left: 4px solid var(--green);
    }

    .message.typing::after {
      content: "";
      display: inline-block;
      width: 7px;
      height: 1.05em;
      margin-left: 3px;
      vertical-align: -0.16em;
      border-radius: 3px;
      background: var(--green);
      animation: caretBlink 0.75s steps(2, start) infinite;
    }

    .message p:first-child {
      margin-top: 0;
    }

    .message p:last-child {
      margin-bottom: 0;
    }

    .input-panel {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 10px;
      padding: 14px;
      border-top: 1px solid var(--line);
      background: #fffaf5;
    }

    input {
      min-width: 0;
      min-height: 48px;
      padding: 0 14px;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      color: var(--ink);
      font: inherit;
      outline: none;
    }

    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.12);
    }

    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 48px;
      padding: 0 18px;
      border: 0;
      border-radius: 8px;
      color: #fff;
      background: linear-gradient(135deg, var(--peach), var(--caramel));
      font: inherit;
      font-weight: 800;
      cursor: pointer;
      transition:
        transform 0.32s cubic-bezier(0.2, 0.7, 0.2, 1),
        box-shadow 0.32s ease,
        opacity 0.32s ease;
    }

    .button:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 18px 42px rgba(216, 111, 61, 0.24);
    }

    .button:disabled {
      cursor: wait;
      opacity: 0.65;
    }

    .loading {
      min-height: 30px;
      padding: 0 18px 14px;
      color: var(--muted);
      font-size: 14px;
    }

    @keyframes backgroundFlow {
      0%, 100% { background-position: 0% 48%; }
      50% { background-position: 100% 52%; }
    }

    @keyframes ribbonDrift {
      from {
        transform: translate3d(-2%, -1%, 0) rotate(-4deg) scale(1);
      }
      to {
        transform: translate3d(3%, 2%, 0) rotate(3deg) scale(1.04);
      }
    }

    @keyframes caretBlink {
      50% { opacity: 0; }
    }

    @media (max-width: 900px) {
      .page {
        grid-template-columns: 1fr;
      }

      .sidebar {
        align-self: stretch;
      }
    }

    @media (max-width: 640px) {
      .nav {
        align-items: stretch;
        flex-direction: column;
        padding: 12px 16px;
      }

      .brand span:last-child {
        white-space: normal;
      }

      .nav-links {
        width: 100%;
        overflow-x: auto;
        padding-bottom: 4px;
      }

      .page {
        min-height: auto;
        padding: 16px 0 0;
      }

      .sidebar {
        margin: 0 16px;
        padding: 16px;
      }

      .tips {
        grid-template-columns: 1fr;
      }

      .chat-panel {
        display: block;
        overflow: visible;
        width: 100%;
        border-right: 0;
        border-left: 0;
        border-radius: 0;
      }

      .chat-container {
        padding: 14px 10px;
        overflow: visible;
      }

      .message {
        width: 100%;
        max-width: 100%;
        padding: 12px 13px;
      }

      .message.user {
        margin-left: 0;
      }

      .input-panel {
        grid-template-columns: 1fr;
        padding: 12px 10px;
      }

      .button {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <nav class="nav">
    <a class="brand" href="/" aria-label="На главную">
      <span class="brand-mark">AI</span>
      <span>Учебный ассистент</span>
    </a>
    <div class="nav-links" aria-label="Навигация">
      <a href="/">Главная</a>
      <a href="/#about">О проекте</a>
      <a href="/#features">Возможности</a>
      <a href="/#architecture">Архитектура</a>
    </div>
  </nav>

  <main class="page">
    <aside class="sidebar">
      <p class="eyebrow">Ассистент</p>
      <h1>Задайте учебный вопрос</h1>
      <p>Лучше всего работают конкретные вопросы: тема, условие задачи и место, где возникло затруднение.</p>
      <div class="tips" aria-label="Примеры вопросов">
        <button class="tip" type="button" data-question="Объясни, как решать квадратные уравнения через дискриминант.">Квадратные уравнения</button>
        <button class="tip" type="button" data-question="Помоги понять закон сохранения энергии на простом примере.">Физика: энергия</button>
        <button class="tip" type="button" data-question="Объясни разницу между метафорой и сравнением.">Русский язык</button>
        <button class="tip" type="button" data-question="Расскажи, что ты за модель, кто тебя создал и для каких образовательных целей ты предназначен.">О модели</button>
      </div>
      <div class="history-actions">
        <button class="clear-history" id="clearHistory" type="button">Очистить историю</button>
      </div>
    </aside>

    <section class="chat-panel" aria-label="Чат с ассистентом">
      <div class="chat-container" id="chat">
        <div class="message bot">
          Здравствуйте! Напишите учебный вопрос, и я помогу разобрать его шаг за шагом.
        </div>
      </div>
      <div class="input-panel">
        <input id="question" placeholder="Введите учебный вопрос..." autocomplete="off">
        <button class="button" id="sendButton" type="button">Отправить</button>
      </div>
      <div id="loading" class="loading" aria-live="polite"></div>
    </section>
  </main>

  <script>
    const chat = document.getElementById("chat");
    const input = document.getElementById("question");
    const loading = document.getElementById("loading");
    const sendButton = document.getElementById("sendButton");
    const clearHistoryButton = document.getElementById("clearHistory");
    const minimumThinkingTime = 850;
    const storageKey = "studyAssistantChatHistory";
    const welcomeMessage = "Здравствуйте! Напишите учебный вопрос, и я помогу разобрать его шаг за шагом.";
    let chatHistory = loadHistory();

    function wait(ms) {
      return new Promise((resolve) => setTimeout(resolve, ms));
    }

    function loadHistory() {
      try {
        const saved = JSON.parse(localStorage.getItem(storageKey) || "[]");
        return Array.isArray(saved) ? saved : [];
      } catch (error) {
        return [];
      }
    }

    function saveHistory() {
      localStorage.setItem(storageKey, JSON.stringify(chatHistory.slice(-60)));
    }

    function historyForRequest() {
      return chatHistory
        .slice(-8)
        .map((item) => ({
          role: item.role,
          content: item.content.slice(0, 900)
        }));
    }

    function addMessage(content, type, shouldSave = false) {
      const message = document.createElement("div");
      message.className = `message ${type}`;
      message.innerHTML = type === "bot" ? marked.parse(content.trim()) : content;
      chat.appendChild(message);
      message.scrollIntoView({ block: "end", behavior: "smooth" });
      if (window.MathJax) {
        MathJax.typesetPromise([message]);
      }
      if (shouldSave) {
        chatHistory.push({
          role: type === "bot" ? "assistant" : "user",
          content
        });
        saveHistory();
      }
    }

    async function addTypedBotMessage(content, shouldSave = false) {
      const message = document.createElement("div");
      message.className = "message bot typing";
      chat.appendChild(message);
      chat.scrollIntoView({ block: "end", behavior: "smooth" });

      const text = content.trim() || "Ответ не получен.";
      const chunkSize = text.length > 900 ? 8 : 4;
      const delay = text.length > 900 ? 10 : 18;

      for (let index = 0; index < text.length; index += chunkSize) {
        message.textContent = text.slice(0, index + chunkSize);
        message.scrollIntoView({ block: "end", behavior: "smooth" });
        await wait(delay);
      }

      message.classList.remove("typing");
      message.innerHTML = marked.parse(text);
      if (window.MathJax) {
        MathJax.typesetPromise([message]);
      }
      if (shouldSave) {
        chatHistory.push({ role: "assistant", content: text });
        saveHistory();
      }
    }

    function renderSavedHistory() {
      chat.innerHTML = "";
      if (chatHistory.length === 0) {
        addMessage(welcomeMessage, "bot");
        return;
      }

      chatHistory.forEach((item) => {
        addMessage(item.content, item.role === "assistant" ? "bot" : "user");
      });
    }

    async function ask() {
      const question = input.value.trim();
      if (!question) return;

      const context = historyForRequest();
      addMessage(question, "user", true);
      input.value = "";
      input.focus();
      loading.textContent = "Ассистент анализирует задачу...";
      sendButton.disabled = true;
      const startedAt = Date.now();

      try {
        const response = await fetch("/ask", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ question, history: context })
        });
        const data = await response.json();
        const elapsed = Date.now() - startedAt;
        if (elapsed < minimumThinkingTime) {
          await wait(minimumThinkingTime - elapsed);
        }
        loading.textContent = "Ассистент печатает ответ...";
        await addTypedBotMessage(data.answer || "Ответ не получен.", true);
      } catch (error) {
        await addTypedBotMessage("Не удалось связаться с сервером. Проверьте запуск приложения и попробуйте снова.", true);
      } finally {
        loading.textContent = "";
        sendButton.disabled = false;
      }
    }

    sendButton.addEventListener("click", ask);
    input.addEventListener("keydown", (event) => {
      if (event.key === "Enter") {
        ask();
      }
    });

    document.querySelectorAll(".tip").forEach((tip) => {
      tip.addEventListener("click", () => {
        input.value = tip.dataset.question;
        input.focus();
      });
    });

    clearHistoryButton.addEventListener("click", () => {
      chatHistory = [];
      saveHistory();
      renderSavedHistory();
      input.focus();
    });

    renderSavedHistory();
  </script>
</body>
</html>
