<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Чат с учебным AI-ассистентом</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script>
    window.MathJax = {
      tex: { inlineMath: [["$", "$"], ["\\(", "\\)"]] },
      svg: { fontCache: "global" }
    };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>
  <style>
    :root {
      --ink: #142033;
      --muted: #64748b;
      --line: #dbe4ef;
      --panel: #ffffff;
      --soft: #f6f8fb;
      --blue: #2563eb;
      --green: #0f766e;
      --shadow: 0 16px 42px rgba(15, 23, 42, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      font-family: Inter, "Segoe UI", system-ui, sans-serif;
      background: linear-gradient(180deg, #fbfdff 0%, #f3f7fb 100%);
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .nav {
      position: sticky;
      top: 0;
      z-index: 20;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      padding: 14px clamp(18px, 5vw, 70px);
      border-bottom: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.88);
      backdrop-filter: blur(14px);
    }

    .brand {
      display: inline-flex;
      align-items: center;
      min-width: 0;
      gap: 10px;
      font-weight: 800;
    }

    .brand-mark {
      display: grid;
      flex: 0 0 auto;
      width: 34px;
      height: 34px;
      place-items: center;
      border-radius: 8px;
      color: #fff;
      background: var(--blue);
      font-size: 14px;
    }

    .nav-links {
      display: flex;
      gap: 4px;
      color: #334155;
      font-size: 14px;
      font-weight: 700;
      white-space: nowrap;
    }

    .nav-links a {
      padding: 9px 10px;
      border-radius: 8px;
    }

    .nav-links a:hover {
      color: var(--blue);
      background: #eef4ff;
    }

    .page {
      display: grid;
      grid-template-columns: minmax(230px, 310px) minmax(0, 1fr);
      gap: 18px;
      min-height: calc(100vh - 63px);
      padding: clamp(18px, 4vw, 38px) clamp(16px, 5vw, 70px);
    }

    .sidebar,
    .chat-panel {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: var(--shadow);
    }

    .sidebar {
      align-self: start;
      padding: 18px;
    }

    .eyebrow {
      display: inline-flex;
      margin: 0 0 12px;
      padding: 7px 10px;
      color: var(--green);
      border: 1px solid #b7e3dc;
      border-radius: 8px;
      background: #f0fdfa;
      font-size: 13px;
      font-weight: 800;
      line-height: 1.35;
    }

    h1 {
      margin: 0;
      font-size: clamp(28px, 4vw, 42px);
      line-height: 1.1;
      letter-spacing: 0;
      overflow-wrap: anywhere;
    }

    .sidebar p {
      margin: 14px 0 0;
      color: var(--muted);
      line-height: 1.6;
    }

    .tips {
      display: grid;
      gap: 10px;
      margin-top: 18px;
    }

    .tip {
      width: 100%;
      padding: 13px;
      border: 1px solid var(--line);
      border-radius: 8px;
      color: #334155;
      background: #fbfdff;
      font: inherit;
      font-weight: 700;
      text-align: left;
      cursor: pointer;
    }

    .tip:hover {
      border-color: #b8c9e2;
      background: #f6f9fd;
    }

    .chat-panel {
      display: grid;
      grid-template-rows: minmax(360px, 1fr) auto auto;
      min-width: 0;
      overflow: hidden;
    }

    .chat-container {
      min-height: 0;
      padding: 20px;
      overflow-y: auto;
      background: #fff;
    }

    .message {
      width: fit-content;
      max-width: min(760px, 86%);
      margin: 0 0 14px;
      padding: 14px 16px;
      border-radius: 8px;
      line-height: 1.62;
      overflow-wrap: anywhere;
    }

    .message.user {
      margin-left: auto;
      color: #fff;
      background: var(--blue);
    }

    .message.bot {
      color: #1e293b;
      background: var(--soft);
      border-left: 4px solid var(--green);
    }

    .message p:first-child {
      margin-top: 0;
    }

    .message p:last-child {
      margin-bottom: 0;
    }

    .input-panel {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 10px;
      padding: 14px;
      border-top: 1px solid var(--line);
      background: #fff;
    }

    input {
      min-width: 0;
      min-height: 48px;
      padding: 0 14px;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      color: var(--ink);
      font: inherit;
      outline: none;
    }

    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.12);
    }

    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 48px;
      padding: 0 18px;
      border: 0;
      border-radius: 8px;
      color: #fff;
      background: var(--blue);
      font: inherit;
      font-weight: 800;
      cursor: pointer;
    }

    .button:disabled {
      cursor: wait;
      opacity: 0.65;
    }

    .loading {
      min-height: 30px;
      padding: 0 18px 14px;
      color: var(--muted);
      font-size: 14px;
    }

    @media (max-width: 900px) {
      .page {
        grid-template-columns: 1fr;
      }

      .sidebar {
        align-self: stretch;
      }
    }

    @media (max-width: 640px) {
      .nav {
        align-items: stretch;
        flex-direction: column;
        padding: 12px 16px;
      }

      .brand span:last-child {
        white-space: normal;
      }

      .nav-links {
        width: 100%;
        overflow-x: auto;
        padding-bottom: 4px;
      }

      .page {
        min-height: auto;
        padding: 16px;
      }

      .sidebar {
        padding: 16px;
      }

      .tips {
        grid-template-columns: 1fr;
      }

      .chat-panel {
        grid-template-rows: minmax(420px, 62vh) auto auto;
      }

      .chat-container {
        padding: 14px;
      }

      .message {
        max-width: 94%;
        padding: 12px 13px;
      }

      .input-panel {
        grid-template-columns: 1fr;
      }

      .button {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <nav class="nav">
    <a class="brand" href="/" aria-label="На главную">
      <span class="brand-mark">AI</span>
      <span>Учебный ассистент</span>
    </a>
    <div class="nav-links" aria-label="Навигация">
      <a href="/">Главная</a>
      <a href="/#about">О проекте</a>
      <a href="/#features">Возможности</a>
      <a href="/#architecture">Архитектура</a>
    </div>
  </nav>

  <main class="page">
    <aside class="sidebar">
      <p class="eyebrow">Ассистент</p>
      <h1>Задайте учебный вопрос</h1>
      <p>Лучше всего работают конкретные вопросы: тема, условие задачи и место, где возникло затруднение.</p>
      <div class="tips" aria-label="Примеры вопросов">
        <button class="tip" type="button" data-question="Объясни, как решать квадратные уравнения через дискриминант.">Квадратные уравнения</button>
        <button class="tip" type="button" data-question="Помоги понять закон сохранения энергии на простом примере.">Физика: энергия</button>
        <button class="tip" type="button" data-question="Объясни разницу между метафорой и сравнением.">Русский язык</button>
        <button class="tip" type="button" data-question="Составь план ответа по теме влияния нейросетей на образование.">План ответа</button>
      </div>
    </aside>

    <section class="chat-panel" aria-label="Чат с ассистентом">
      <div class="chat-container" id="chat">
        <div class="message bot">
          Здравствуйте! Напишите учебный вопрос, и я помогу разобрать его шаг за шагом.
        </div>
      </div>
      <div class="input-panel">
        <input id="question" placeholder="Введите учебный вопрос..." autocomplete="off">
        <button class="button" id="sendButton" type="button">Отправить</button>
      </div>
      <div id="loading" class="loading" aria-live="polite"></div>
    </section>
  </main>

  <script>
    const chat = document.getElementById("chat");
    const input = document.getElementById("question");
    const loading = document.getElementById("loading");
    const sendButton = document.getElementById("sendButton");

    function addMessage(content, type) {
      const message = document.createElement("div");
      message.className = `message ${type}`;
      message.innerHTML = type === "bot" ? marked.parse(content.trim()) : content;
      chat.appendChild(message);
      chat.scrollTop = chat.scrollHeight;
      if (window.MathJax) {
        MathJax.typesetPromise([message]);
      }
    }

    async function ask() {
      const question = input.value.trim();
      if (!question) return;

      addMessage(question, "user");
      input.value = "";
      input.focus();
      loading.textContent = "Ассистент анализирует задачу...";
      sendButton.disabled = true;

      try {
        const response = await fetch("/ask", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ question })
        });
        const data = await response.json();
        addMessage(data.answer || "Ответ не получен.", "bot");
      } catch (error) {
        addMessage("Не удалось связаться с сервером. Проверьте запуск приложения и попробуйте снова.", "bot");
      } finally {
        loading.textContent = "";
        sendButton.disabled = false;
      }
    }

    sendButton.addEventListener("click", ask);
    input.addEventListener("keydown", (event) => {
      if (event.key === "Enter") {
        ask();
      }
    });

    document.querySelectorAll(".tip").forEach((tip) => {
      tip.addEventListener("click", () => {
        input.value = tip.dataset.question;
        input.focus();
      });
    });
  </script>
</body>
</html>
